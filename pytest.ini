[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# 输出配置
addopts = 
    -v
    --tb=short
    --strict-markers

# 标记
markers =
    unit: 单元测试
    integration: 集成测试
    effectiveness: 效果验证测试
    slow: 慢速测试

# 日志配置
log_cli = false
log_cli_level = INFO
